<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Chat Yaichko 🥚</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  display: flex;
  height: 100vh;
  background: #f6f6f6;
}

/* SIDEBAR */
.sidebar {
  width: 280px;
  background: #1e1e1e;
  color: white;
  padding: 12px;
  display: flex;
  flex-direction: column;
}

.title {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 10px;
}

.chat {
  padding: 12px;
  margin: 6px 0;
  background: #2a2a2a;
  border-radius: 12px;
  cursor: pointer;
}

.chat.active {
  background: #555;
}

/* MAIN */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* HEADER */
.header {
  padding: 15px;
  background: white;
  border-bottom: 1px solid #ddd;
  font-weight: bold;
}

/* MESSAGES */
.messages {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.msg {
  max-width: 60%;
  padding: 12px;
  border-radius: 16px;
  line-height: 1.4;
}

.user {
  background: #d7ebff;
  align-self: flex-end;
}

.bot {
  background: white;
  border: 1px solid #eee;
}

/* INPUT */
.inputArea {
  display: flex;
  padding: 12px;
  background: white;
  border-top: 1px solid #ddd;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #ddd;
  outline: none;
}

button {
  margin-left: 10px;
  padding: 12px 16px;
  border: none;
  border-radius: 12px;
  background: black;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="title">Chat Yaichko 🥚</div>
  <div class="chat active">Общий чат</div>
</div>

<div class="main">

  <div class="header">Чат</div>

  <div class="messages" id="messages"></div>

  <div class="inputArea">
    <input id="input" placeholder="Напиши сообщение...">
    <button onclick="send()">➤</button>
  </div>

</div>

<script>
let messages = [];

function render() {
  const box = document.getElementById("messages");
  box.innerHTML = "";

  messages.forEach(m => {
    const div = document.createElement("div");
    div.className = "msg " + m.type;
    div.innerText = m.text;
    box.appendChild(div);
  });

  box.scrollTop = box.scrollHeight;
}

async function send() {
  const input = document.getElementById("input");
  if (!input.value) return;

  const text = input.value;

  messages.push({ type: "user", text: "Ты: " + text });
  render();

  const res = await fetch("http://localhost:3000/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message: text })
  });

  const data = await res.json();

  messages.push({ type: "bot", text: data.reply });
  input.value = "";
  render();
}

render();
</script>

</body>
</html>
