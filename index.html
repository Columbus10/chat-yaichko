<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Chat Yaichko 🥚</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }

body {
  display:flex;
  height:100vh;
}

/* SIDEBAR */
.sidebar {
  width:260px;
  background:#111;
  color:white;
  padding:10px;
  display:flex;
  flex-direction:column;
}

.top {
  display:flex;
  gap:5px;
  margin-bottom:10px;
}

.top button {
  flex:1;
  padding:8px;
  border:none;
  cursor:pointer;
  border-radius:6px;
}

.chat {
  padding:10px;
  background:#222;
  margin:5px 0;
  border-radius:8px;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.chat.active {
  background:#555;
}

.delete {
  color:red;
  cursor:pointer;
}

/* MAIN */
.main {
  flex:1;
  display:flex;
  flex-direction:column;
  background:#f3f3f3;
}

.messages {
  flex:1;
  padding:15px;
  overflow:auto;
}

.msg {
  max-width:60%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
}

.user { background:#cfe8ff; margin-left:auto; }
.bot { background:white; }

.input {
  display:flex;
  padding:10px;
  background:#ddd;
}

input {
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
}

button {
  margin-left:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:black;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">

  <div class="top">
    <button onclick="addChat()">➕</button>
  </div>

  <div id="chatList"></div>

</div>

<div class="main">

  <div class="messages" id="messages"></div>

  <div class="input">
    <input id="input" placeholder="Напиши сообщение...">
    <button onclick="send()">➤</button>
  </div>

</div>

<script>

let chats = [];
let current = 0;

function init() {
  addChat();
  renderChats();
  renderMessages();
}

function addChat() {
  chats.push([]);
  current = chats.length - 1;
  renderChats();
  renderMessages();
}

function deleteChat(i, e) {
  e.stopPropagation();

  chats.splice(i,1);

  if (chats.length === 0) {
    addChat();
  }

  current = 0;
  renderChats();
  renderMessages();
}

function switchChat(i) {
  current = i;
  renderChats();
  renderMessages();
}

function renderChats() {
  const list = document.getElementById("chatList");
  list.innerHTML = "";

  chats.forEach((c, i) => {
    const div = document.createElement("div");
    div.className = "chat" + (i === current ? " active" : "");
    div.onclick = () => switchChat(i);

    div.innerHTML = `
      <span>Чат ${i+1}</span>
      <span class="delete" onclick="deleteChat(${i}, event)">✖</span>
    `;

    list.appendChild(div);
  });
}

function renderMessages() {
  const box = document.getElementById("messages");
  box.innerHTML = "";

  chats[current].forEach(m => {
    const div = document.createElement("div");
    div.className = "msg " + m.type;
    div.innerText = m.text;
    box.appendChild(div);
  });

  box.scrollTop = box.scrollHeight;
}

function send() {
  const input = document.getElementById("input");
  if (!input.value) return;

  chats[current].push({type:"user", text:"Ты: " + input.value});
  chats[current].push({type:"bot", text:"🥚 Яичко: " + fake(input.value)});

  input.value = "";
  renderMessages();
}

function fake(text) {
  const a = [
    "интересно 🤔",
    "я подумаю 🥚",
    "я ещё маленькое яйцо",
    "звучит сложно",
    "хорошая идея!"
  ];
  return a[Math.floor(Math.random()*a.length)];
}

init();

</script>

</body>
</html>
